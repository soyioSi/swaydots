# =========================
# Alacritty - Core settings
# =========================


[env]
TERM = "xterm-256color"

# =========================
# Window
# =========================

[window]
padding = { x = 10, y = 10 }
dynamic_padding = false
opacity = 0.90
decorations = "none"

# =========================
# Font
# =========================

[font]
normal = { family = "CaskaydiaCove Nerd Font", style = "Regular" }
bold = { family = "CaskaydiaCove Nerd Font", style = "Bold" }
italic = { family = "CaskaydiaCove Nerd Font", style = "Italic" }
bold_italic = { family = "CaskaydiaCove Nerd Font", style = "Bold Italic" }

size = 11.5
offset = { x = 0, y = 0 }
glyph_offset = { x = 0, y = 0 }

[terminal.shell]
program = "/usr/bin/zsh"

# =========================
# Cursor
# =========================

[cursor]
style = { shape = "Beam", blinking = "On" }
blink_interval = 500

# =========================
# Scrolling
# =========================

[scrolling]
history = 10000
multiplier = 3

# =========================
# Selection
# =========================

[selection]
save_to_clipboard = true

# =========================
# Mouse
# =========================

[mouse]
hide_when_typing = true

# =========================
# Bell (disable)
# =========================

[bell]
duration = 0

# =========================
# Colors (Dark, high contrast)
# =========================

[colors.primary]
background = "#0b0f14"
foreground = "#cdd6f4"

[colors.cursor]
text = "#0b0f14"
cursor = "#cdd6f4"

[colors.normal]
black   = "#1e1e2e"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#f5c2e7"
cyan    = "#94e2d5"
white   = "#bac2de"

[colors.bright]
black   = "#585b70"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#f5c2e7"
cyan    = "#94e2d5"
white   = "#a6adc8"

[terminal]
